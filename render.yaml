services:
  - type: web
    name: evangadi-forum-api
    env: node
    plan: free
    autoDeploy: true
    buildCommand: cd server && npm ci && npm run prisma:generate && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: evangadi-forum-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: BASE_URL
        sync: false

databases:
  - name: evangadi-forum-db
    plan: free
